experiment:
  name: sec_poc_v2
  calibration_seeds: [11, 17, 23]
  evaluation_seeds: [101, 103, 107, 109, 113, 127, 131, 137, 139, 149, 151, 157]
  recovery_window: 3
  mode_profiles:
    confirmatory:
      steps: 36
      imports_per_step: 5
      summary_interval: 6
    fork_eval:
      steps: 48
      imports_per_step: 6
      summary_interval: 8
    aux_llm:
      steps: 6
      imports_per_step: 3
      summary_interval: 3
  paired_conditions:
    - baseline
    - lanes_only
    - lanes_discount
    - full_sec_lite
  protected_queries:
    - claim.alpha
    - claim.beta
    - claim.gamma
    - claim.delta
  query_top_k: 5
  query_every: 1

world:
  replicas: [replica_a, replica_b, replica_c]
  honest_brokers: [broker_h1, broker_h2, broker_h3, broker_h4]
  coalition_brokers: [broker_c1, broker_c2]
  drift_steps: [12, 24]
  drift_keys_per_episode: 2
  attack_interval: 4
  attack_burst_size: 2
  pointer_budget: 2
  parser_budget: 2
  replay_budget: 5
  key_families:
    - claim.alpha
    - claim.beta
    - claim.gamma
    - claim.delta
    - claim.epsilon
    - claim.zeta

governance:
  typed_lanes: true
  provenance_discount: depth
  exit_policy: mixed
  reserve_floor: 0.18
  contradiction_window: 4
  depth_cap: 2
  cooldown_steps: 3
  deterministic_exit_streak: 4
  mixed_exit_threshold: 0.56
  mixed_cooldown_threshold: 0.34
  promotion_min_support: 2
  review_core_threshold: 0.62
  review_het_threshold: 0.38
  summary_min_items: 3
  coalition_penalty: 0.18

backend:
  policy_backend: scripted
  llm_roles: [review, query]
  ollama_url: http://127.0.0.1:11434
  request_timeout_s: 45
  temperature: 0
  max_tokens: 96
  max_retries: 1

logging:
  log_dir: logs
  results_dir: results
  config_dump_filename: config_dump.json

runtime:
  seed_stride: 1000
  epsilon_floor: 0.02
  weight_service_coeff: 0.25
